  <style>
    /* ============================================

    /* ============================================
       HERO — brand mark FOREGROUNDED, brass radial
       ============================================ */
    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 96px 0 0;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(ellipse 80% 50% at 50% 35%, rgba(201,162,75,0.18) 0%, rgba(201,162,75,0.05) 35%, transparent 70%),
        linear-gradient(180deg, #110D07 0%, var(--forge-black) 70%);
    }
    /* corner vignette */
    .hero::after {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 100% 0%, rgba(107,30,30,0.22) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 0% 100%, rgba(0,0,0,0.6) 0%, transparent 60%);
      pointer-events: none; z-index: 1;
    }
    .hero__inner {
      position: relative; z-index: 2;

      gap: 28px;
      align-items: start;
      padding-top: 24px;

    @media (min-width: 1024px) {
      .hero {
        padding: 120px 0 0;
        justify-content: center;
      }
      .hero__inner {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.25fr);

    .hero__crest img {
      position: relative;

    @media (min-width: 1024px) {
      .hero__crest { order: 1; }
      .hero__crest img { width: min(48vw, 620px); }
    }

    .hero__content { position: relative; z-index: 2; }
    .hero__chip {
      display: inline-flex;
      align-items: center;

      color: var(--aged-brass);
      margin-bottom: 16px;
      opacity: 0; transform: translateY(8px);

    .hero__chip::before {

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .hero__chip, .hero__h1, .hero__rule, .hero__subhead, .hero__meta, .hero__scroll {
        opacity: 1; transform: none; animation: none;
      }
      .hero__scroll::before { animation: none; }
    }

    /* ============================================

    .marquee {
      position: relative;
      background: var(--aged-brass);
      color: var(--forge-black);

      border-top: 1px solid rgba(0,0,0,0.15);
      border-bottom: 1px solid rgba(0,0,0,0.15);

      align-items: center;

    }
    @keyframes scroll-x {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    @media (prefers-reduced-motion: reduce) {
      .marquee__track { animation: none; }
    }

    .section-label {
